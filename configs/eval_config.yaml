# Evaluation settings
evaluation:
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall
  
  retrieval_metrics:
    - ndcg
    - mrr
    - precision_at_k
    - recall_at_k
  
  k_values: [1, 3, 5, 10]
  faithfulness_threshold: 0.7
  relevancy_threshold: 0.7

# Dataset settings
dataset:
  eval_dataset_path: "data/eval_datasets/qa_pairs.json"
  sample_size: 100