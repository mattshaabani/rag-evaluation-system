# Chunking settings
chunking:
  chunk_size: 512
  chunk_overlap: 50
  strategies:
    - sliding_window
    - semantic
    - hierarchical

# Embedding settings
embeddings:
  dense_model: "all-MiniLM-L6-v2"
  sparse_model: "bm25"
  hybrid_weight: 0.5       # 0 = full sparse, 1 = full dense

# Retrieval settings
retrieval:
  top_k: 5
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# Generation settings
generation:
  backend: "anthropic"
  model: "claude-haiku-4-5-20251001"
  temperature: 0.1
  max_tokens: 1024

# Vector store settings
vectorstore:
  provider: "chroma"       # or "qdrant"
  collection_name: "rag_documents"