version: "3.9"

# ─────────────────────────────────────────────
# Shared network — all services talk to each other
# ─────────────────────────────────────────────
networks:
  rag-network:
    driver: bridge

# ─────────────────────────────────────────────
# Persistent volumes — data survives container restarts
# ─────────────────────────────────────────────
volumes:
  chroma-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
  mlflow-data:

services:

  # ─────────────────────────────────────────────
  # 1. RAG API — our FastAPI application
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      # Mount data directory so documents persist
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      - chromadb
      - qdrant
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # 2. ChromaDB — vector store
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - rag-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # 3. Qdrant — alternative vector store
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC port
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rag-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # 4. Prometheus — metrics collection
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - rag-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # 5. Grafana — metrics visualization
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: rag-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rag-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # 6. MLflow — experiment tracking UI
  # ─────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: rag-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlruns"
    networks:
      - rag-network
    restart: unless-stopped